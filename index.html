<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#1B4332"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="WC2026"/>
<meta name="description" content="Track FIFA World Cup 2026 — predictions, watch parties, full schedule. Seattle host city themed."/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<title>World Cup 2026 · Seattle Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="config.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#2D6A4F;--gm:#52B788;--gl:#D8F3DC;--gx:#F0FAF4;
  --t:#1B6CA8;--tm:#4DA1D8;--tl:#D6EAF8;
  --c:#7B4F2E;--cm:#C1885A;--cl:#F5E6D8;
  --gold:#C9981A;--goldl:#FEF3CD;
  --bg:#FAFAF9;--s:#fff;--s2:#F4F3F0;
  --bd:rgba(0,0,0,.08);--bd2:rgba(0,0,0,.13);
  --tx:#1A1A18;--tx2:#5A5A56;--tx3:#9A9890;
  --r:12px;--rs:8px;--rl:16px;--rp:999px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04);
  --shc:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --nh:64px;--f:'Inter',system-ui,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#0F1410;--s:#1A1F1B;--s2:#242921;
  --bd:rgba(255,255,255,.08);--bd2:rgba(255,255,255,.14);
  --tx:#F2F2EE;--tx2:#A8A89E;--tx3:#66665E;
  --gx:#0D1F14;--gl:#1A3D28;--tl:#0D1E2E;--cl:#1F130A;--goldl:#1F1600;
  --sh:0 1px 3px rgba(0,0,0,.5),0 4px 16px rgba(0,0,0,.35);
}}
html,body{height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--tx)}
button,input,select{font-family:var(--f)}
#app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* ── TOP BAR ── */
.top-bar{background:linear-gradient(135deg,#1B4332 0%,#2D6A4F 50%,#1B5A88 100%);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;position:relative;overflow:hidden;flex-shrink:0}
.top-bar::before{content:'';position:absolute;top:-50px;right:-30px;width:200px;height:200px;border-radius:50%;background:rgba(77,161,216,.15)}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;gap:8px}
.top-logo-title{font-size:18px;font-weight:600;color:#fff;letter-spacing:-.3px}
.top-logo-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:1px}
.top-pills{display:flex;gap:5px;margin-top:8px;position:relative;z-index:1;flex-wrap:wrap}
.top-pill{font-size:10px;padding:3px 8px;border-radius:var(--rp);background:rgba(255,255,255,.14);color:rgba(255,255,255,.88);border:.5px solid rgba(255,255,255,.2)}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:600;padding:4px 10px;border-radius:var(--rp);background:#E24B4A;color:#fff;white-space:nowrap;flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1.3s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── AUTH BAR ── */
.auth-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--s);border-bottom:.5px solid var(--bd);flex-shrink:0;min-height:48px}
.auth-avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid var(--gl)}
.auth-name{font-size:13px;font-weight:500;color:var(--tx);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.auth-sub{font-size:11px;color:var(--tx3)}
.auth-btn{font-size:12px;font-weight:500;padding:6px 14px;border-radius:var(--rp);border:.5px solid var(--bd2);background:transparent;color:var(--tx2);white-space:nowrap;display:flex;align-items:center;gap:5px}
.auth-btn:hover{background:var(--s2)}
.auth-btn.primary{background:var(--g);color:#fff;border-color:var(--g)}
.auth-btn.primary:hover{opacity:.9}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--gm);flex-shrink:0}
.sync-dot.syncing{animation:blink .8s infinite}
.sync-dot.error{background:#E24B4A}

/* ── SCROLL ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:calc(var(--nh) + env(safe-area-inset-bottom,0px) + 8px)}

/* ── BOTTOM NAV ── */
.bottom-nav{height:calc(var(--nh) + env(safe-area-inset-bottom,0px));padding-bottom:env(safe-area-inset-bottom,0px);background:var(--s);border-top:.5px solid var(--bd);display:flex;align-items:stretch;flex-shrink:0;position:relative;z-index:10}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 4px 4px;border:none;background:transparent;color:var(--tx3);transition:color .15s;cursor:pointer}
.nav-tab.active{color:var(--g)}
.nav-tab i{font-size:22px}
.nav-tab span{font-size:10px;font-weight:500}
.nav-indicator{position:absolute;top:0;height:2px;background:var(--g);border-radius:0 0 2px 2px;transition:left .2s cubic-bezier(.4,0,.2,1),width .2s}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:6px;padding:8px 16px 4px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.fchip{flex-shrink:0;font-size:12px;padding:6px 14px;border-radius:var(--rp);border:1px solid var(--bd2);background:var(--s);color:var(--tx2);white-space:nowrap;display:flex;align-items:center;gap:4px;cursor:pointer;transition:all .15s}
.fchip.active{background:var(--g);color:#fff;border-color:var(--g)}
.fchip:hover:not(.active){background:var(--gx);border-color:var(--gm);color:var(--g)}
.search-wrap{padding:8px 16px;position:relative}
.search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--tx3);pointer-events:none}
.search-in{width:100%;padding:10px 14px 10px 38px;border-radius:var(--rp);border:1px solid var(--bd2);background:var(--s2);color:var(--tx);font-size:14px;font-family:var(--f)}
.search-in:focus{outline:none;border-color:var(--gm);background:var(--s)}

/* ── MATCH LIST ── */
.day-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px 6px;position:sticky;top:0;background:var(--bg);z-index:2}
.day-hdr-text{font-size:11px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.07em}
.day-hdr-pill{font-size:10px;padding:2px 8px;border-radius:var(--rp);background:var(--gl);color:var(--g);font-weight:500}
.mlist{padding:0 16px;display:flex;flex-direction:column;gap:8px;padding-bottom:8px}

/* ── MATCH CARD ── */
.mcard{background:var(--s);border-radius:var(--rl);border:1px solid var(--bd);padding:12px 14px;box-shadow:var(--shc);transition:border-color .15s}
.mcard.ep{border-left:3px solid var(--g);background:linear-gradient(90deg,var(--gx) 0%,var(--s) 70%)}
.mcard.eh{border-left:3px solid var(--t);background:linear-gradient(90deg,var(--tl) 0%,var(--s) 70%)}
.mcard.es{opacity:.55}
.mcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.mteams{font-size:15px;font-weight:600;color:var(--tx);line-height:1.3}
.mtags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;align-items:center}
.mmeta{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
.mmeta-item{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--tx2)}
.mmeta-item i{font-size:12px}
.mactions{display:flex;gap:5px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);align-items:center;flex-wrap:wrap}
.plan-lbl{font-size:11px;color:var(--tx3);margin-right:2px}
.evbtn{font-size:11px;padding:5px 11px;border-radius:var(--rp);border:1px solid var(--bd2);background:transparent;color:var(--tx2);display:flex;align-items:center;gap:3px;cursor:pointer;white-space:nowrap;transition:all .12s}
.evbtn.ep{background:var(--gl);color:var(--g);border-color:var(--gm)}
.evbtn.eh{background:var(--tl);color:var(--t);border-color:var(--tm)}
.evbtn.es{background:var(--s2);color:var(--tx3);border-color:var(--bd)}
.fav-btn{background:transparent;border:none;padding:4px;line-height:1;font-size:18px;cursor:pointer}
.mright{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}

/* ── STAGE BADGES ── */
.sb{font-size:10px;padding:2px 8px;border-radius:var(--rp);font-weight:600;letter-spacing:.02em;white-space:nowrap}
.sb-Group{background:var(--gl);color:#1B4332}
.sb-R32{background:var(--tl);color:#0B3E6F}
.sb-R16{background:var(--goldl);color:#5A3E0A}
.sb-QF{background:var(--cl);color:#4A2010}
.sb-SF{background:#EDE7F6;color:#311B92}
.sb-Final{background:var(--g);color:#fff}
.sea-tag{font-size:10px;padding:2px 8px;border-radius:var(--rp);background:linear-gradient(90deg,#2D6A4F,#1B6CA8);color:#fff;font-weight:500}

/* ── PREDICTIONS ── */
.pred-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px}
.pred-lbl{font-size:11px;color:var(--tx3)}
.score-in{width:38px;height:32px;text-align:center;font-size:14px;font-weight:600;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--s2);color:var(--tx)}
.score-in:focus{outline:none;border-color:var(--gm)}
.win-sel{font-size:12px;padding:6px 8px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--s);color:var(--tx);max-width:130px}
.win-sel:focus{outline:none;border-color:var(--gm)}
.save-btn{font-size:12px;padding:6px 14px;border-radius:var(--rp);border:1px solid var(--g);color:var(--g);background:transparent;font-weight:500;cursor:pointer}
.save-btn:active{background:var(--gl)}
.pchip{font-size:11px;font-weight:600;color:var(--g);background:var(--gl);padding:3px 9px;border-radius:var(--rp)}

/* ── CALENDAR ── */
.cal-legend{display:flex;gap:10px;padding:8px 16px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cal-nav{display:flex;align-items:center;gap:10px;padding:8px 16px}
.cal-mo-lbl{font-size:16px;font-weight:600;color:var(--tx);flex:1}
.cal-mo-btn{width:32px;height:32px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--s);display:flex;align-items:center;justify-content:center;color:var(--tx2);cursor:pointer}
.gcal-btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:7px 14px;border:1px solid var(--tm);border-radius:var(--rp);background:transparent;color:var(--t);font-weight:500;cursor:pointer}
.gcal-btn:active{background:var(--tl)}
.cal-gw{padding:0 12px}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-dow{text-align:center;font-size:10px;color:var(--tx3);padding:4px 0;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{min-height:62px;border:1px solid var(--bd);border-radius:var(--rs);padding:4px;background:var(--s);cursor:pointer;transition:border-color .1s}
.cal-cell:active{background:var(--s2)}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.today{border-color:var(--g);border-width:1.5px}
.cal-cell.selected{background:var(--gx);border-color:var(--g)}
.cal-dnum{font-size:10px;color:var(--tx2);margin-bottom:2px;font-weight:500}
.cal-cell.today .cal-dnum{color:var(--g);font-weight:700}
.cal-pip{font-size:9px;padding:1px 3px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4}
.pip-Group{background:var(--gl);color:#1B4332}
.pip-R32{background:var(--tl);color:#0B3E6F}
.pip-R16{background:var(--goldl);color:#5A3E0A}
.pip-QF{background:var(--cl);color:#4A2010}
.pip-SF{background:#EDE7F6;color:#311B92}
.pip-Final{background:var(--g);color:#fff}
.cal-detail{padding:0 16px;margin-top:12px}
.cal-detail-hdr{font-size:11px;font-weight:600;color:var(--g);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px 16px}
.stat-card{background:var(--s);border-radius:var(--r);border:1px solid var(--bd);padding:10px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:600;color:var(--tx)}
.stat-lbl{font-size:10px;color:var(--tx3);margin-top:2px}
.stat-card.g .stat-val{color:var(--g)}
.stat-card.t .stat-val{color:var(--t)}
.stat-card.c .stat-val{color:var(--c)}
.stat-card.gl .stat-val{color:var(--gold)}
.pred-ring{margin:8px 16px;background:var(--s);border-radius:var(--rl);border:1px solid var(--gl);padding:14px 16px;display:flex;align-items:center;gap:14px}
.prog-sec{padding:0 16px 8px}
.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.prog-lbl{font-size:12px;color:var(--tx2);min-width:90px}
.prog-track{flex:1;height:6px;background:var(--s2);border-radius:var(--rp);overflow:hidden}
.prog-fill{height:100%;border-radius:var(--rp);transition:width .5s ease}
.prog-ct{font-size:11px;color:var(--tx3);min-width:32px;text-align:right}

/* ── PLAN ── */
.donut-wrap{display:flex;align-items:center;gap:16px;padding:0 16px 8px;flex-wrap:wrap}
.plan-leg{display:flex;flex-direction:column;gap:6px}
.pl-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)}
.pl-sw{width:12px;height:12px;border-radius:2px;flex-shrink:0}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:12px 16px 6px}
.sec-hdr-text{font-size:11px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.sec-hdr-line{flex:1;height:1px;background:var(--bd)}

/* ── SHARE ── */
.share-card{margin:8px 16px;background:var(--gx);border:1px solid var(--gl);border-radius:var(--rl);padding:14px}
.share-input{width:100%;padding:8px 10px;border-radius:var(--rs);border:1px solid var(--gl);background:var(--s);color:var(--tx);font-size:13px;margin:6px 0 8px}
.share-link{font-size:12px;color:var(--t);word-break:break-all;background:var(--s);padding:8px 10px;border-radius:var(--rs);border:1px solid var(--tl);margin-top:6px}

/* ── EMPTY / TOAST ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;color:var(--tx3);text-align:center;gap:8px}
.empty-icon{font-size:40px}
.empty-text{font-size:14px}
.toast{position:fixed;bottom:calc(var(--nh) + env(safe-area-inset-bottom,0px) + 12px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--tx);color:var(--bg);font-size:13px;font-weight:500;padding:10px 20px;border-radius:var(--rp);opacity:0;transition:all .25s;z-index:100;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── LOADING OVERLAY ── */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:200;transition:opacity .3s}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:32px;height:32px;border:3px solid var(--gl);border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:14px;color:var(--tx2)}
</style>
</head>
<body>
<div id="loading-overlay" class="loading-overlay">
  <div style="font-size:28px">⚽</div>
  <div class="loading-spinner"></div>
  <div class="loading-text">Loading World Cup 2026…</div>
</div>

<div id="app">
  <div class="top-bar">
    <div class="top-bar-inner">
      <div>
        <div class="top-logo-title">⚽ World Cup 2026</div>
        <div class="top-logo-sub">Seattle Tracker · Jun 11 – Jul 19</div>
      </div>
      <span class="live-badge"><span class="live-dot"></span><span id="countdown-text">LIVE</span></span>
    </div>
    <div class="top-pills">
      <span class="top-pill">48 teams</span>
      <span class="top-pill">104 matches</span>
      <span class="top-pill">6 Seattle games</span>
      <span class="top-pill">All times PT</span>
    </div>
  </div>

  <!-- Auth bar -->
  <div class="auth-bar" id="auth-bar">
    <div id="auth-signed-out" style="display:flex;align-items:center;gap:8px;width:100%">
      <div style="flex:1">
        <div class="auth-name" style="font-size:12px">Sign in to sync across devices &amp; share predictions</div>
      </div>
      <button class="auth-btn primary" onclick="App.signIn()">
        <i class="ti ti-brand-google" style="font-size:14px" aria-hidden="true"></i> Sign in
      </button>
    </div>
    <div id="auth-signed-in" style="display:none;align-items:center;gap:8px;width:100%">
      <div class="sync-dot" id="sync-dot"></div>
      <img id="auth-avatar" class="auth-avatar" src="" alt="" style="display:none"/>
      <div style="flex:1;min-width:0">
        <div class="auth-name" id="auth-name">Signed in</div>
        <div class="auth-sub" id="auth-status">Syncing…</div>
      </div>
      <button class="auth-btn" onclick="App.signOut()">Sign out</button>
    </div>
  </div>

  <div class="scroll-area" id="scroll-area">

    <!-- SCHEDULE -->
    <div id="view-schedule" class="view active">
      <div class="search-wrap">
        <i class="ti ti-search search-icon" aria-hidden="true"></i>
        <input class="search-in" type="search" placeholder="Search team, group, or venue…" id="srch" oninput="App.rSched()"/>
      </div>
      <div class="filter-bar" id="stage-chips">
        <button class="fchip active" data-stage="" onclick="App.setStage(this,'')">All</button>
        <button class="fchip" data-stage="Group" onclick="App.setStage(this,'Group')">Group</button>
        <button class="fchip" data-stage="R32" onclick="App.setStage(this,'R32')">R32</button>
        <button class="fchip" data-stage="R16" onclick="App.setStage(this,'R16')">R16</button>
        <button class="fchip" data-stage="QF" onclick="App.setStage(this,'QF')">QF</button>
        <button class="fchip" data-stage="SF" onclick="App.setStage(this,'SF')">SF</button>
        <button class="fchip" data-stage="Final" onclick="App.setStage(this,'Final')">Final</button>
        <button class="fchip" id="fav-chip" onclick="App.tFavF()"><i class="ti ti-star" style="font-size:12px" aria-hidden="true"></i> Starred</button>
        <button class="fchip" id="plan-chip" onclick="App.tPlanF()"><i class="ti ti-calendar-event" style="font-size:12px" aria-hidden="true"></i> Planned</button>
        <button class="fchip" id="sea-chip" onclick="App.tSeaF()">📍 Seattle</button>
      </div>
      <div id="sched-list"></div>
    </div>

    <!-- CALENDAR -->
    <div id="view-calendar" class="view">
      <div class="cal-legend">
        <div class="leg-item"><span class="leg-dot" style="background:#52B788"></span>Group</div>
        <div class="leg-item"><span class="leg-dot" style="background:#4DA1D8"></span>R32</div>
        <div class="leg-item"><span class="leg-dot" style="background:#C9981A"></span>R16</div>
        <div class="leg-item"><span class="leg-dot" style="background:#C1885A"></span>QF</div>
        <div class="leg-item"><span class="leg-dot" style="background:#7B5EA7"></span>SF</div>
        <div class="leg-item"><span class="leg-dot" style="background:#2D6A4F"></span>Final</div>
        <div class="leg-item"><span style="font-size:12px">🎉</span>Party</div>
        <div class="leg-item"><span style="font-size:12px">🏠</span>Home</div>

// ── LOCAL STORAGE (offline fallback) ─────────────────────────
function lsSave(){
  try{
    localStorage.setItem('wc26_p', JSON.stringify(D.preds));
    localStorage.setItem('wc26_e', JSON.stringify(D.evts));
    localStorage.setItem('wc26_f', JSON.stringify([...D.favs]));
  }catch(e){}
}
function lsLoad(){
  try{
    const p=localStorage.getItem('wc26_p'); if(p) D.preds=JSON.parse(p);
    const e=localStorage.getItem('wc26_e'); if(e) D.evts=JSON.parse(e);
    const f=localStorage.getItem('wc26_f'); if(f) D.favs=new Set(JSON.parse(f));
  }catch(e){}
}

// ── SYNC STATUS ───────────────────────────────────────────────
function setSyncStatus(state){
  const dot=document.getElementById('sync-dot');
  const sub=document.getElementById('auth-status');
  if(state==='syncing'){dot.className='sync-dot syncing';sub.textContent='Syncing…';}
  else if(state==='ok'){dot.className='sync-dot';sub.textContent='Synced ✓';}
  else if(state==='error'){dot.className='sync-dot error';sub.textContent='Sync error — using local';}
  else if(state==='offline'){dot.className='sync-dot';sub.textContent='Offline — data saved locally';}
}

// ── AUTH INIT ─────────────────────────────────────────────────
async function initAuth(){
  lsLoad(); // always load local first for instant render
  App.rSched();

  const { data:{ subscription } } = supabase.auth.onAuthStateChange(async (event, session) => {
    if(session?.user){
      S.user = session.user;
      showSignedIn(S.user);
      await syncFromSupabase();
    } else {
      S.user = null;
      showSignedOut();
    }
  });

  // Check for shared snapshot in URL
  const slug = location.pathname.match(/\/share\/([a-z0-9]+)/)?.[1];
  if(slug) await loadAndShowShare(slug);

  document.getElementById('loading-overlay').classList.add('hidden');
}

async function syncFromSupabase(){
  if(!S.user) return;
  setSyncStatus('syncing');
  try{
    const data = await loadAllUserData(S.user.id);
    D.preds = data.preds;
    D.evts  = data.evts;
    D.favs  = data.favs;
    S.synced = true;
    lsSave();
    setSyncStatus('ok');
    App.rSched(); App.rPred(); App.rPlan();
  }catch(e){
    console.error('Supabase sync error:', e);
    setSyncStatus('error');
  }
}

function showSignedIn(user){
  document.getElementById('auth-signed-out').style.display='none';
  const si=document.getElementById('auth-signed-in');
  si.style.display='flex';
  document.getElementById('auth-name').textContent = user.user_metadata?.full_name || user.email;
  const av=document.getElementById('auth-avatar');
  const avatarUrl=user.user_metadata?.avatar_url;
  if(avatarUrl){av.src=avatarUrl;av.style.display='block';}
}
function showSignedOut(){
  document.getElementById('auth-signed-in').style.display='none';
  document.getElementById('auth-signed-out').style.display='flex';
}

async function loadAndShowShare(slug){
  try{
    const snap = await loadSharedSnapshot(slug);
    D.preds = snap.predictions || {};
    App.toast(`Viewing ${snap.display_name || 'shared predictions'}`);
    App.sw('predictions');
  }catch(e){ console.warn('Could not load share:', e); }
}

function ptTime(m){
  const[h,mn]=m.time.split(':').map(Number);
  const pt=(h-3+24)%24;
  const ap=pt>=12?'PM':'AM';const h12=pt%12||12;
  return`${h12}:${mn.toString().padStart(2,'0')} ${ap} PT`;
}
function sb(s){
  const lbl={Group:'Group',R32:'R32',R16:'R16',QF:'QF',SF:'SF',Final:'FINAL'}[s]||s;
  return`<span class="sb sb-${s}">${lbl}</span>`;
}
function mTitle(m){return m.away?`${m.home} vs ${m.away}`:m.home}
function gEv(id){return D.evts[id]||null}
function gPr(id){return D.preds[id]||null}
function isFav(id){return D.favs.has(id)}

  const nowFav = !D.favs.has(id);
  nowFav ? D.favs.add(id) : D.favs.delete(id);
  lsSave(); App.rSched(); App.rCal(); App.rPred(); App.rPlan();
  App.toast(nowFav ? '⭐ Starred' : 'Unstarred');
  if(S.user){ try{ await toggleFavorite(S.user.id, id, nowFav); }catch(e){setSyncStatus('error');} }
}
async function setEv(id, t){
  const same = D.evts[id]===t;
  same ? delete D.evts[id] : D.evts[id]=t;
  lsSave(); App.rSched(); App.rCal(); App.rPlan();
  if(!same){ const lbl={party:'🎉 Watch party set',home:'🏠 Watching at home',skip:'Marked skip'}; App.toast(lbl[t]||'Saved'); }
  if(S.user){ try{ await saveEvent(S.user.id, id, same?null:t); }catch(e){setSyncStatus('error');} }
}
async function savePred(id){
  const hs=document.getElementById(`ph-${id}`)?.value;
  const as=document.getElementById(`pa-${id}`)?.value;
  const w=document.getElementById(`pw-${id}`)?.value;
  if(!D.preds[id]) D.preds[id]={};
  if(hs!==''&&as!==''){D.preds[id].h=hs;D.preds[id].a=as;}
  if(w) D.preds[id].w=w;
  lsSave(); App.rPred(); App.rPlan();
  App.toast('🎯 Prediction saved!');
  if(S.user){ try{ await savePrediction(S.user.id, id, hs, as, w); }catch(e){setSyncStatus('error');} }
}

// ── MATCH CARD ────────────────────────────────────────────────
function mCard(m, showPred){
  const ev=gEv(m.id),pr=gPr(m.id),fav=isFav(m.id);
  let evCls='';
  if(ev==='party') evCls='ep'; else if(ev==='home') evCls='eh'; else if(ev==='skip') evCls='es';
  const seaTag=SEA.has(m.id)?`<span class="sea-tag">📍 Seattle</span>`:'';
  const grpTag=m.group?`<span class="sb" style="background:var(--gl);color:#1B4332;font-size:10px">Grp ${m.group}</span>`:'';
  let predHtml='';
  if(showPred){
    const has=pr&&pr.h!==undefined;
    predHtml=`<div class="pred-row">
      <span class="pred-lbl">Score</span>
      <input class="score-in" id="ph-${m.id}" type="number" min="0" max="20" placeholder="–" value="${has?pr.h:''}" ${m.away?'':'disabled'}/>
      <span style="font-size:13px;color:var(--tx3)">–</span>
      <input class="score-in" id="pa-${m.id}" type="number" min="0" max="20" placeholder="–" value="${has?pr.a:''}" ${m.away?'':'disabled'}/>
      ${m.away?`<select class="win-sel" id="pw-${m.id}">
        <option value="">Winner?</option>
        <option ${pr?.w===m.home?'selected':''}>${m.home}</option>
        <option value="Draw" ${pr?.w==='Draw'?'selected':''}>Draw</option>
        <option ${pr?.w===m.away?'selected':''}>${m.away}</option>
      </select>`:''}
      <button class="save-btn" onclick="App._savePred(${m.id})">Save</button>
      ${has?`<span class="pchip">${pr.h}–${pr.a}${pr.w?' · '+pr.w:''}</span>`:''}
    </div>`;
  }
  return`<div class="mcard ${evCls}">
    <div class="mcard-top">
      <div style="flex:1;min-width:0">
        <div class="mteams">${mTitle(m)}</div>
        <div class="mtags">${grpTag}${sb(m.stage)}${seaTag}</div>
        <div class="mmeta">
          <span class="mmeta-item"><i class="ti ti-clock" aria-hidden="true"></i>${ptTime(m)}</span>
          <span class="mmeta-item"><i class="ti ti-map-pin" aria-hidden="true"></i>${m.venue}</span>
        </div>
        ${predHtml}
      </div>
      <div class="mright">
        ${sb(m.stage)}
        <button class="fav-btn" onclick="App._tFav(${m.id})" aria-label="${fav?'Unstar':'Star'}">
          <i class="ti ti-star" style="font-size:20px;color:${fav?'#C9981A':'var(--tx3)'}" aria-hidden="true"></i>
        </button>
      </div>
    </div>
    <div class="mactions">
      <span class="plan-lbl">Plan:</span>
      <button class="evbtn ${ev==='party'?'ep':''}" onclick="App._setEv(${m.id},'party')"><i class="ti ti-users" style="font-size:12px" aria-hidden="true"></i> Party</button>
      <button class="evbtn ${ev==='home'?'eh':''}" onclick="App._setEv(${m.id},'home')"><i class="ti ti-home" style="font-size:12px" aria-hidden="true"></i> Home</button>
      <button class="evbtn ${ev==='skip'?'es':''}" onclick="App._setEv(${m.id},'skip')"><i class="ti ti-x" style="font-size:12px" aria-hidden="true"></i> Skip</button>
    </div>
  </div>`;
}

// ── RENDER FUNCTIONS ──────────────────────────────────────────
function rSched(){
  const q=(document.getElementById('srch')?.value||'').toLowerCase();
  const ms=MATCHES.filter(m=>{
    if(S.stageF&&m.stage!==S.stageF) return false;
    if(S.favF&&!isFav(m.id)) return false;
    if(S.planF&&!gEv(m.id)) return false;
    if(S.seaF&&!SEA.has(m.id)) return false;
    if(q){const t=(m.home+m.away+m.venue+m.group).toLowerCase();if(!t.includes(q))return false;}
    return true;
  });
  if(!ms.length){ document.getElementById('sched-list').innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No matches found</div></div>'; return; }
  let html='',last='';
  ms.forEach(m=>{
    if(m.date!==last){
      const d=new Date(m.date+'T12:00:00');
      const cnt=ms.filter(x=>x.date===m.date).length;
      html+=`<div class="day-hdr"><span class="day-hdr-text">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span><span class="day-hdr-pill">${cnt} match${cnt>1?'es':''}</span></div><div class="mlist">`;
      last=m.date;
    }
    html+=mCard(m,false);
    const nxt=ms[ms.indexOf(m)+1];
    if(!nxt||nxt.date!==m.date) html+='</div>';
  });
  document.getElementById('sched-list').innerHTML=html;
}

function setStage(el,s){ S.stageF=s; document.querySelectorAll('#stage-chips .fchip[data-stage]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); rSched(); }
function setPStage(el,s){ S.pstageF=s; document.querySelectorAll('.fchip[data-pstage]').forEach(b=>b.classList.remove('active')); el.classList.add('active'); rPred(); }
function tFavF(){ S.favF=!S.favF; document.getElementById('fav-chip').classList.toggle('active',S.favF); rSched(); }
function tPlanF(){ S.planF=!S.planF; document.getElementById('plan-chip').classList.toggle('active',S.planF); rSched(); }
function tSeaF(){ S.seaF=!S.seaF; document.getElementById('sea-chip').classList.toggle('active',S.seaF); rSched(); }
function tUnpF(){ S.unpF=!S.unpF; document.getElementById('unp-chip').classList.toggle('active',S.unpF); rPred(); }

function rCal(){
  const yr=S.calYr,mo=S.calMo;
  document.getElementById('mo-lbl').textContent=new Date(yr,mo,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  const fdow=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  let html='';
  for(let i=0;i<fdow;i++) html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=dim;d++){
    const ds=`${yr}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dm=MATCHES.filter(m=>m.date===ds);
    const isT=d===TODAY.getDate()&&mo===TODAY.getMonth()&&yr===TODAY.getFullYear();
    const isSel=S.selDay===ds;
    html+=`<div class="cal-cell${isT?' today':''}${isSel?' selected':''}" onclick="App._selDay('${ds}')"><div class="cal-dnum">${d}</div>`;
    dm.slice(0,4).forEach(m=>{
      const ev=gEv(m.id),dot=ev==='party'?'🎉':ev==='home'?'🏠':'';
      html+=`<div class="cal-pip pip-${m.stage}">${dot}${SEA.has(m.id)?'⚡':''}${m.home.slice(0,4)}</div>`;
    });
    if(dm.length>4) html+=`<div style="font-size:9px;color:var(--gm)">+${dm.length-4}</div>`;
    html+='</div>';
  }
  document.getElementById('cal-grid').innerHTML=html;
  if(S.selDay) rCalDetail(S.selDay);
}
function selDay(ds){ S.selDay=S.selDay===ds?null:ds; rCal(); }
function rCalDetail(ds){
  const dm=MATCHES.filter(m=>m.date===ds);
  if(!dm.length){ document.getElementById('cal-detail').innerHTML=''; return; }
  const d=new Date(ds+'T12:00:00');
  let html=`<div class="cal-detail-hdr">${d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})} — ${dm.length} match${dm.length>1?'es':''}</div>`;
  dm.forEach(m=>{ html+=mCard(m,false); });
  document.getElementById('cal-detail').innerHTML=html;
}
function pMo(){ if(S.calMo===5&&S.calYr===2026)return; S.calMo--; if(S.calMo<0){S.calMo=11;S.calYr--;} rCal(); }
function nMo(){ if(S.calMo===6&&S.calYr===2026)return; S.calMo++; if(S.calMo>11){S.calMo=0;S.calYr++;} rCal(); }
function expGCal(){
  const pl=MATCHES.filter(m=>gEv(m.id)&&gEv(m.id)!=='skip');
  if(!pl.length){ toast('Set some games as Party or Home first!'); return; }
  const m=pl[0];
  const[y,mo,d]=m.date.split('-');const[h,mn]=m.time.split(':');
  const sdt=`${y}${mo}${d}T${h}${mn}00`;
  const eh=String(parseInt(h)+2).padStart(2,'0');
  const edt=`${y}${mo}${d}T${eh}${mn}00`;
  window.open(`https://www.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(`⚽ ${mTitle(m)} | WC2026`)}&dates=${sdt}/${edt}&location=${encodeURIComponent(m.venue)}&details=FIFA+World+Cup+2026`,'_blank');
}

function rPred(){
  const sf=S.pstageF;
  const ms=MATCHES.filter(m=>{ if(sf&&m.stage!==sf)return false; if(S.unpF&&gPr(m.id))return false; return true; });
  const tot=MATCHES.length,done=MATCHES.filter(m=>gPr(m.id)).length;
  const pct=Math.round(done/tot*100);
  const seaDone=[...SEA].filter(id=>gPr(id)).length;
  const stageData=[
    {s:'Group',lbl:'Group stage',cnt:72,col:'#52B788'},
    {s:'R32',lbl:'Round of 32',cnt:16,col:'#4DA1D8'},
    {s:'R16',lbl:'Round of 16',cnt:8,col:'#C9981A'},
    {s:'QF',lbl:'Quarters',cnt:4,col:'#C1885A'},
    {s:'SF',lbl:'Semis',cnt:3,col:'#7B5EA7'},
    {s:'Final',lbl:'Final',cnt:1,col:'#1B4332'},
  ];
  document.getElementById('pred-header').innerHTML=`
    <div class="pred-ring">
      <svg width="64" height="64" viewBox="0 0 64 64" aria-label="Prediction completion ${pct}%" role="img">
        <circle cx="32" cy="32" r="26" fill="none" stroke="var(--gl)" stroke-width="8"/>
        <circle cx="32" cy="32" r="26" fill="none" stroke="#2D6A4F" stroke-width="8"
          stroke-dasharray="${(2*Math.PI*26).toFixed(1)}"
          stroke-dashoffset="${(2*Math.PI*26*(1-pct/100)).toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 32 32)"/>
        <text x="32" y="37" text-anchor="middle" font-size="14" font-weight="600" fill="#2D6A4F">${pct}%</text>
      </svg>
      <div>
        <div style="font-size:22px;font-weight:600;color:var(--g)">${done} <span style="font-size:14px;font-weight:400;color:var(--tx2)">/ ${tot}</span></div>
        <div style="font-size:11px;color:var(--tx3)">Seattle: ${seaDone} / ${SEA.size} predicted</div>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card g"><div class="stat-val">${done}</div><div class="stat-lbl">Made</div></div>
      <div class="stat-card t"><div class="stat-val">${tot-done}</div><div class="stat-lbl">Left</div></div>
      <div class="stat-card c"><div class="stat-val">${pct}%</div><div class="stat-lbl">Done</div></div>
      <div class="stat-card gl"><div class="stat-val">${seaDone}</div><div class="stat-lbl">Seattle</div></div>
    </div>
    <div class="prog-sec">
      ${stageData.map(({s,lbl,cnt,col})=>{
        const sd=MATCHES.filter(m=>m.stage===s&&gPr(m.id)).length;
        const sp=Math.round(sd/cnt*100);
        return`<div class="prog-row"><span class="prog-lbl">${lbl}</span><div class="prog-track"><div class="prog-fill" style="width:${sp}%;background:${col}"></div></div><span class="prog-ct">${sd}/${cnt}</span></div>`;
      }).join('')}
    </div>`;
  let html='',last='';
  ms.forEach(m=>{
    if(m.date!==last){
      const d=new Date(m.date+'T12:00:00');
      html+=`<div class="day-hdr"><span class="day-hdr-text">${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</span></div><div class="mlist">`;
      last=m.date;
    }
    html+=mCard(m,true);
    const nxt=ms[ms.indexOf(m)+1];
    if(!nxt||nxt.date!==m.date) html+='</div>';
  });
  document.getElementById('pred-list').innerHTML=html||'<div class="empty-state"><div class="empty-icon">🎯</div><div class="empty-text">All predicted!</div></div>';
}

function rPlan(){
  const parties=MATCHES.filter(m=>gEv(m.id)==='party');
  const homes=MATCHES.filter(m=>gEv(m.id)==='home');
  const skips=MATCHES.filter(m=>gEv(m.id)==='skip');
  const starred=MATCHES.filter(m=>isFav(m.id));
  document.getElementById('plan-header').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card g"><div class="stat-val">${parties.length}</div><div class="stat-lbl">🎉 Parties</div></div>
      <div class="stat-card t"><div class="stat-val">${homes.length}</div><div class="stat-lbl">🏠 Home</div></div>
      <div class="stat-card c"><div class="stat-val">${skips.length}</div><div class="stat-lbl">Skip</div></div>
      <div class="stat-card gl"><div class="stat-val">${starred.length}</div><div class="stat-lbl">⭐ Starred</div></div>
    </div>`;
  const total=parties.length+homes.length+skips.length;
  const ds=document.getElementById('plan-donut-sec');
  if(total>0){
    ds.innerHTML=`<div class="donut-wrap">
      <canvas id="donut-c" width="110" height="110" role="img" aria-label="Watch plan: ${parties.length} parties, ${homes.length} at home, ${skips.length} skipping"></canvas>
      <div class="plan-leg">
        <div class="pl-item"><span class="pl-sw" style="background:#52B788"></span>Watch parties (${parties.length})</div>
        <div class="pl-item"><span class="pl-sw" style="background:#4DA1D8"></span>At home (${homes.length})</div>
        <div class="pl-item"><span class="pl-sw" style="background:#888780"></span>Skipping (${skips.length})</div>
        <button class="gcal-btn" style="margin-top:6px" onclick="App.expGCal()"><i class="ti ti-brand-google" style="font-size:13px" aria-hidden="true"></i> Export GCal</button>
      </div>
    </div>`;
    if(donutChart) donutChart.destroy();
    donutChart=new Chart(document.getElementById('donut-c'),{
      type:'doughnut',
      data:{labels:['Parties','At home','Skipping'],datasets:[{data:[parties.length,homes.length,skips.length],backgroundColor:['#52B788','#4DA1D8','#888780'],borderWidth:0}]},
      options:{responsive:false,plugins:{legend:{display:false}},cutout:'65%'}
    });
  } else { ds.innerHTML=''; }

  // Share section
  const ss=document.getElementById('plan-share-sec');
  const done=MATCHES.filter(m=>gPr(m.id)).length;
  if(done>0){
    ss.innerHTML=`<div class="share-card">
      <div style="font-size:13px;font-weight:600;color:var(--g);margin-bottom:6px"><i class="ti ti-share" style="font-size:14px" aria-hidden="true"></i> Share your predictions</div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">${done} predictions ready to share</div>
      <input class="share-input" id="share-name" placeholder="Your name (e.g. Alejo's picks)" value="${S.user?.user_metadata?.full_name||''}"/>
      <button class="auth-btn primary" onclick="App.shareLink()" style="width:100%;justify-content:center">
        <i class="ti ti-link" style="font-size:14px" aria-hidden="true"></i> Generate share link
      </button>
      <div id="share-result"></div>
    </div>`;
  } else { ss.innerHTML=''; }

  let html='';
  if(!parties.length&&!homes.length&&!starred.length){ html='<div class="empty-state"><div class="empty-icon">🗓️</div><div class="empty-text">Star matches and set watch plans<br>in the Schedule or Calendar</div></div>'; }
  if(parties.length){ html+=`<div class="sec-hdr"><span class="sec-hdr-text">Watch parties</span><span class="sec-hdr-line"></span></div><div class="mlist">`; parties.forEach(m=>{html+=mCard(m,false);}); html+='</div>'; }
  if(homes.length){ html+=`<div class="sec-hdr"><span class="sec-hdr-text">At home</span><span class="sec-hdr-line"></span></div><div class="mlist">`; homes.forEach(m=>{html+=mCard(m,false);}); html+='</div>'; }
  if(starred.length){ html+=`<div class="sec-hdr"><span class="sec-hdr-text">Starred</span><span class="sec-hdr-line"></span></div><div class="mlist">`; starred.forEach(m=>{html+=mCard(m,false);}); html+='</div>'; }
  document.getElementById('plan-list').innerHTML=html;
}

async function shareLink(){
  if(!S.user){ toast('Sign in to create share links'); return; }
  const name=document.getElementById('share-name')?.value||'My predictions';
  try{
    const url=await createShareLink(S.user.id, name, D.preds);
    document.getElementById('share-result').innerHTML=`<div class="share-link">${url}</div>`;
    await navigator.clipboard.writeText(url).catch(()=>{});
    toast('Link copied! 🔗');
  }catch(e){ toast('Could not create link'); }
}

// ── NAV ───────────────────────────────────────────────────────
function sw(v){
  const views=['schedule','calendar','predictions','myplan'];
  views.forEach(x=>{ document.getElementById(`view-${x}`).classList.remove('active'); document.getElementById(`tab-${x}`).classList.remove('active'); });
  document.getElementById(`view-${v}`).classList.add('active');
  document.getElementById(`tab-${v}`).classList.add('active');
  document.getElementById('scroll-area').scrollTop=0;
  const tab=document.getElementById(`tab-${v}`);
  const ind=document.getElementById('nav-ind');
  ind.style.left=tab.offsetLeft+'px'; ind.style.width=tab.offsetWidth+'px';
  if(v==='calendar') rCal();
  if(v==='predictions') rPred();
  if(v==='myplan') rPlan();
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

// ── COUNTDOWN ─────────────────────────────────────────────────
function updateCountdown(){
  const kickoff=new Date('2026-06-11T15:00:00-06:00'), now=new Date(), diff=kickoff-now;
  if(diff<=0){ document.getElementById('countdown-text').textContent='LIVE'; return; }
  const days=Math.floor(diff/86400000),hrs=Math.floor((diff%86400000)/3600000);
  document.getElementById('countdown-text').textContent=days>0?`${days}D ${hrs}H`:`${hrs}H`;
}

// ── EXPOSE TO GLOBAL (for onclick handlers) ───────────────────
window.App = {
  signIn: signInWithGoogle,
  signOut: async () => { await sbSignOut(); toast('Signed out'); },
  rSched, rCal, rPred, rPlan, sw, toast, expGCal, shareLink,
  setStage, setPStage, tFavF, tPlanF, tSeaF, tUnpF, pMo, nMo,
  _tFav: tFavId, _setEv: setEv, _savePred: savePred, _selDay: selDay,
};

// ── BOOT ──────────────────────────────────────────────────────
rSched();
updateCountdown();
setInterval(updateCountdown, 60000);
requestAnimationFrame(()=>{ const t=document.getElementById('tab-schedule'),i=document.getElementById('nav-ind'); i.style.left=t.offsetLeft+'px'; i.style.width=t.offsetWidth+'px'; });
initAuth();
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
